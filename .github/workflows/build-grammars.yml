name: Build Grammars Bundle

on:
  push:
    tags: ['v*']  # Only on binary release tags
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
            ext: dylib
            cc_flags: "-arch arm64"
          - os: macos-13
            platform: darwin-x86_64
            ext: dylib
            cc_flags: "-arch x86_64"
          - os: ubuntu-latest
            platform: linux-x86_64
            ext: so
            cc_flags: ""
          - os: ubuntu-latest
            platform: linux-aarch64
            ext: so
            cc_flags: ""
          - os: windows-latest
            platform: windows-x86_64
            ext: dll
            cc_flags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler (ARM64)
        if: matrix.platform == 'linux-aarch64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Build all grammars
        shell: bash
        run: |
          set +e  # Don't exit on individual grammar build failures
          WORKSPACE="$(pwd)"
          # Cross-compilation: use aarch64 compiler for ARM64 Linux
          if [ "${{ matrix.platform }}" = "linux-aarch64" ]; then
            CC=aarch64-linux-gnu-gcc
            CXX=aarch64-linux-gnu-g++
          else
            CC=cc
            CXX=c++
          fi
          mkdir -p grammars-out
          : > grammars-out/.expected-languages

          for plugin_dir in plugins/*/; do
            name=$(basename "$plugin_dir")
            toml="$plugin_dir/plugin.toml"

            # Skip plugins without [grammar] section
            if ! grep -q '\[grammar\]' "$toml" 2>/dev/null; then
              echo "::notice::Skipping $name — no grammar"
              continue
            fi
            echo "$name" >> grammars-out/.expected-languages

            source=$(grep 'source = ' "$toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            ref=$(grep 'ref = ' "$toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')

            echo "Building $name from $source ($ref)..."

            # Clone grammar source
            if ! git clone --depth 1 --branch "$ref" "$source" "grammar-src-$name" 2>/dev/null; then
              if ! git clone --depth 1 "$source" "grammar-src-$name" 2>/dev/null; then
                echo "::warning::Failed to clone $name"
                continue
              fi
            fi

            cd "grammar-src-$name"

            # Auto-detect grammar subdirectory
            GRAMMAR_DIR="."
            if [ ! -f grammar.js ]; then
              if [ -f "$name/grammar.js" ]; then
                GRAMMAR_DIR="$name"
              elif [ -f "grammars/$name/grammar.js" ]; then
                GRAMMAR_DIR="grammars/$name"
              else
                FOUND=$(find . -name grammar.js -maxdepth 3 | head -1)
                [ -n "$FOUND" ] && GRAMMAR_DIR=$(dirname "$FOUND")
              fi
            fi

            cd "$GRAMMAR_DIR"
            # Install npm deps if package.json exists (TypeScript, Svelte, Vue need this)
            [ -f package.json ] && npm install --ignore-scripts 2>/dev/null || true
            tree-sitter generate || true

            # Find src directory
            SRC_DIR="src"
            if [ ! -f "$SRC_DIR/parser.c" ]; then
              for sub in */src; do
                [ -f "$sub/parser.c" ] && SRC_DIR="$sub" && break
              done
            fi

            if [ ! -f "$SRC_DIR/parser.c" ]; then
              echo "::warning::$name: parser.c not found"
              cd "$WORKSPACE"
              continue
            fi

            # Compile parser.c (auto-generated, suppress warnings)
            $CC -c -fPIC -O2 -w ${{ matrix.cc_flags }} -I "$SRC_DIR" "$SRC_DIR/parser.c" -o parser.o

            OBJECTS="parser.o"
            [ -f "$SRC_DIR/scanner.c" ] && {
              $CC -c -fPIC -O2 -Wall ${{ matrix.cc_flags }} -I "$SRC_DIR" "$SRC_DIR/scanner.c" -o scanner.o
              OBJECTS="$OBJECTS scanner.o"
            }

            if [ -f "$SRC_DIR/scanner.cc" ]; then
              $CXX -c -fPIC -O2 -Wall ${{ matrix.cc_flags }} -I "$SRC_DIR" "$SRC_DIR/scanner.cc" -o scanner_cc.o
              OBJECTS="$OBJECTS scanner_cc.o"
              $CXX -shared ${{ matrix.cc_flags }} $OBJECTS -o "$WORKSPACE/grammars-out/$name.${{ matrix.ext }}"
            else
              $CC -shared ${{ matrix.cc_flags }} $OBJECTS -o "$WORKSPACE/grammars-out/$name.${{ matrix.ext }}"
            fi

            cd "$WORKSPACE"
            rm -rf "grammar-src-$name"

            if [ -f "grammars-out/$name.${{ matrix.ext }}" ]; then
              echo "  ✓ $name"
            else
              echo "  ✗ $name (build failed)"
            fi
          done

      - name: Package grammars bundle
        shell: bash
        run: |
          set -euo pipefail
          expected_file="grammars-out/.expected-languages"
          if [ ! -s "$expected_file" ]; then
            echo "::error::No expected grammar list was produced."
            exit 1
          fi
          expected_count=$(wc -l < "$expected_file" | tr -d ' ')
          built_count=$(find grammars-out -maxdepth 1 -type f -name '*.${{ matrix.ext }}' | wc -l | tr -d ' ')
          if [ "$built_count" != "$expected_count" ]; then
            echo "::error::Partial grammar bundle for ${{ matrix.platform }}: built $built_count of $expected_count expected grammars."
            echo "Missing languages:"
            comm -23 \
              <(sort "$expected_file") \
              <(find grammars-out -maxdepth 1 -type f -name '*.${{ matrix.ext }}' -exec basename {} .${{ matrix.ext }} \; | sort) || true
            exit 1
          fi

          # Create directory structure matching what ensure_grammars_installed expects:
          # <lang>/grammars/<platform>.<ext>
          mkdir -p bundle
          manifest="bundle/sentrux-grammar-manifest.json"
          grammar_file="${{ matrix.platform }}.${{ matrix.ext }}"
          {
            echo "{"
            echo "  \"schemaVersion\": 1,"
            echo "  \"platform\": \"${{ matrix.platform }}\","
            echo "  \"grammarFile\": \"$grammar_file\","
            echo "  \"languages\": ["
          } > "$manifest"
          first=1

          for grammar in $(find grammars-out -maxdepth 1 -type f -name '*.${{ matrix.ext }}' | sort); do
            name=$(basename "$grammar" .${{ matrix.ext }})
            mkdir -p "bundle/$name/grammars"
            mkdir -p "bundle/$name/queries"
            cp "$grammar" "bundle/$name/grammars/$grammar_file"
            if [ -f "plugins/$name/queries/tags.scm" ]; then
              cp "plugins/$name/queries/tags.scm" "bundle/$name/queries/tags.scm"
            else
              : > "bundle/$name/queries/tags.scm"
            fi
            sha=$(sha256sum "$grammar" | awk '{print $1}')
            awk -v key="${{ matrix.platform }}" -v sha="$sha" '
              BEGIN { in_checksums = 0; inserted = 0 }
              /^\[checksums\]/ {
                print
                print key " = \"" sha "\""
                inserted = 1
                in_checksums = 1
                next
              }
              /^\[.*\]/ { in_checksums = 0 }
              in_checksums && $0 ~ "^[[:space:]]*" key "[[:space:]]*=" { next }
              { print }
              END {
                if (!inserted) {
                  print ""
                  print "[checksums]"
                  print key " = \"" sha "\""
                }
              }
            ' "plugins/$name/plugin.toml" > "bundle/$name/plugin.toml"

            if [ "$first" -eq 0 ]; then
              echo "," >> "$manifest"
            fi
            first=0
            printf '    {"language":"%s","grammar":"%s","sha256":"%s","path":"%s/grammars/%s"}' \
              "$name" "$grammar_file" "$sha" "$name" "$grammar_file" >> "$manifest"
          done
          {
            echo
            echo "  ]"
            echo "}"
          } >> "$manifest"

          cd bundle
          tar czf "../grammars-${{ matrix.platform }}.tar.gz" */
          cd ..

          echo "Bundle size:"
          ls -lh "grammars-${{ matrix.platform }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grammars-${{ matrix.platform }}
          path: grammars-${{ matrix.platform }}.tar.gz

  attach-to-release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all platform bundles
        uses: actions/download-artifact@v4

      - name: Verify complete grammar asset matrix
        shell: bash
        run: |
          set -euo pipefail
          for asset in \
            grammars-darwin-arm64/grammars-darwin-arm64.tar.gz \
            grammars-darwin-x86_64/grammars-darwin-x86_64.tar.gz \
            grammars-linux-x86_64/grammars-linux-x86_64.tar.gz \
            grammars-linux-aarch64/grammars-linux-aarch64.tar.gz \
            grammars-windows-x86_64/grammars-windows-x86_64.tar.gz
          do
            test -f "$asset" || {
              echo "::error::Missing grammar release asset: $asset"
              exit 1
            }
          done

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            grammars-darwin-arm64/grammars-darwin-arm64.tar.gz
            grammars-darwin-x86_64/grammars-darwin-x86_64.tar.gz
            grammars-linux-x86_64/grammars-linux-x86_64.tar.gz
            grammars-linux-aarch64/grammars-linux-aarch64.tar.gz
            grammars-windows-x86_64/grammars-windows-x86_64.tar.gz
