name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}   # manual trigger — fork auto-triggers are disabled by GitHub until
                          # enabled in the Actions UI; dispatch on a v* tag to build that release.

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: sentrux-darwin-arm64
            features: vendored-openssl
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: sentrux-darwin-x86_64
            features: vendored-openssl
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: sentrux-linux-x86_64
            features: vendored-openssl
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: sentrux-linux-aarch64
            features: vendored-openssl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sentrux-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            # Add arm64 architecture for cross-compilation packages
            sudo dpkg --add-architecture arm64
            sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe" | sudo tee /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            sudo apt-get update
            sudo apt-get install -y gcc-aarch64-linux-gnu \
              libxcb-render0-dev:arm64 \
              libxcb-shape0-dev:arm64 \
              libxcb-xfixes0-dev:arm64 \
              libxkbcommon-dev:arm64 || \
            sudo apt-get install -y gcc-aarch64-linux-gnu
          else
            sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev \
              libxcb-xfixes0-dev libxkbcommon-dev libvulkan-dev
          fi

      - name: Checkout Pro crate (official release only)
        if: github.repository == 'sentrux/sentrux'
        uses: actions/checkout@v4
        with:
          repository: sentrux/sentrux-pro
          token: ${{ secrets.PRO_REPO_TOKEN }}
          path: sentrux-pro-checkout

      - name: Link Pro crate paths
        if: github.repository == 'sentrux/sentrux'
        shell: bash
        run: |
          mv sentrux-pro-checkout ../sentrux-pro
          # Patch paths: sentrux-pro references ../sentrux-fresh, CI uses ../sentrux
          sed -i.bak 's|../sentrux-fresh|../sentrux|g' ../sentrux-pro/Cargo.toml

      - name: Set cross-compilation linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "[target.aarch64-unknown-linux-gnu]" >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV

      - name: Statically link Windows CRT
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          "RUSTFLAGS=-C target-feature=+crt-static" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build release binary (with Pro)
        if: github.repository == 'sentrux/sentrux'
        run: cargo build --release --manifest-path ../sentrux-pro/Cargo.toml --target-dir target --target ${{ matrix.target }}

      - name: Build release binary (Heurex fork)
        if: github.repository != 'sentrux/sentrux'
        run: cargo build --release -p sentrux --target-dir target --target ${{ matrix.target }} ${{ matrix.features && format('--features {0}', matrix.features) || '' }}

      - name: Package binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            cp target/${{ matrix.target }}/release/sentrux.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/sentrux ${{ matrix.artifact }}
            chmod +x ${{ matrix.artifact }}
          fi

      - name: Audit Windows runtime dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bytes = [System.IO.File]::ReadAllBytes("${{ matrix.artifact }}")
          $text = [System.Text.Encoding]::ASCII.GetString($bytes)
          $bad = [regex]::Matches($text, '(?i)(vcruntime[^\x00\r\n ]*\.dll|msvcp[^\x00\r\n ]*\.dll|api-ms-win-crt[^\x00\r\n ]*\.dll|ucrtbase\.dll)') |
            ForEach-Object { $_.Value.ToLowerInvariant() } |
            Sort-Object -Unique
          if ($bad) {
            $bad | ForEach-Object { Write-Error "Forbidden Windows runtime dependency: $_" }
            throw "Windows release asset must not require VC++/UCRT redistributables."
          }

      - name: Audit Linux runtime dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          ldd "${{ matrix.artifact }}" | tee runtime-dependencies.txt
          if grep -E 'lib(ssl|crypto|gtk|gdk|glib|gobject)-|lib(ssl|crypto|gtk|gdk|glib|gobject)\.so' runtime-dependencies.txt; then
            echo "Forbidden Linux runtime-package dependency found." >&2
            exit 1
          fi

      - name: Audit macOS runtime dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          otool -L "${{ matrix.artifact }}" | tee runtime-dependencies.txt
          if grep -E '/opt/homebrew|/usr/local/opt|libssl|libcrypto' runtime-dependencies.txt; then
            echo "Forbidden macOS package-manager runtime dependency found." >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.repository == 'sentrux/sentrux' && github.ref_name || format('Sentrux {0} (Heurex fork)', github.ref_name) }}
          files: |
            sentrux-darwin-arm64/sentrux-darwin-arm64
            sentrux-darwin-x86_64/sentrux-darwin-x86_64
            sentrux-linux-x86_64/sentrux-linux-x86_64
            sentrux-linux-aarch64/sentrux-linux-aarch64
            sentrux-windows-x86_64.exe/sentrux-windows-x86_64.exe
          generate_release_notes: true

      - name: Update Homebrew formula
        if: github.repository == 'sentrux/sentrux'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_DARWIN=$(sha256sum sentrux-darwin-arm64/sentrux-darwin-arm64 | cut -d' ' -f1)
          SHA_LINUX=$(sha256sum sentrux-linux-x86_64/sentrux-linux-x86_64 | cut -d' ' -f1)

          FORMULA=$(cat <<RUBY
          class Sentrux < Formula
            desc "Live codebase visualization and structural quality gate"
            homepage "https://github.com/sentrux/sentrux"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/sentrux/sentrux/releases/download/v${VERSION}/sentrux-darwin-arm64"
                sha256 "${SHA_DARWIN}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/sentrux/sentrux/releases/download/v${VERSION}/sentrux-linux-x86_64"
                sha256 "${SHA_LINUX}"
              end
            end

            def install
              if OS.mac? && Hardware::CPU.arm?
                bin.install "sentrux-darwin-arm64" => "sentrux"
              elsif OS.linux? && Hardware::CPU.intel?
                bin.install "sentrux-linux-x86_64" => "sentrux"
              end
            end

            test do
              assert_match "sentrux", shell_output("#{bin}/sentrux --help 2>&1", 1)
            end
          end
          RUBY
          )

          FILE_SHA=$(gh api repos/sentrux/homebrew-tap/contents/Formula/sentrux.rb --jq '.sha')
          CONTENT_B64=$(echo "$FORMULA" | base64 -w0)

          gh api repos/sentrux/homebrew-tap/contents/Formula/sentrux.rb -X PUT \
            -f message="Update sentrux to v${VERSION}" \
            -f "committer[name]=yjing" \
            -f "committer[email]=yjing@sentrux.dev" \
            -f "sha=$FILE_SHA" \
            -f "content=$CONTENT_B64"
