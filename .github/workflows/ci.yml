name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['v*']  # Don't run on tag pushes — ci-release handles those
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        # Windows: tree-sitter-scss build script incompatible with MSVC
        # Will re-enable when upstream fixes -Wno-unused-parameter flag
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need tags for grammar download from previous release

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libvulkan-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build

      - name: Install language grammars
        shell: bash
        run: |
          # Try release tags until we find one with grammars.
          # On tag pushes, the NEW release won't have grammars yet (still building).
          # Failed/superseded tags may not have grammar assets, so keep going.
          PLATFORM=$([ "$RUNNER_OS" = "macOS" ] && echo "darwin-arm64" || echo "linux-x86_64")
          mkdir -p ~/.sentrux/plugins
          DOWNLOADED=false
          for TAG in $(git tag --sort=-v:refname); do
            URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/grammars-${PLATFORM}.tar.gz"
            if curl -fsSL "$URL" -o /tmp/grammars.tar.gz 2>/dev/null; then
              echo "Grammar bundle downloaded from ${TAG}"
              tar xzf /tmp/grammars.tar.gz -C ~/.sentrux/plugins/
              DOWNLOADED=true
              break
            fi
          done
          if [ "$DOWNLOADED" = false ]; then
            echo "::error::Grammar download failed from all release tags"
            exit 1
          fi
          # Sync embedded plugin configs and prove the runtime can load C#.
          # `--version` exits inside clap parsing and does not run startup sync.
          SENTRUX_SKIP_GRAMMAR_DOWNLOAD=1 cargo run -- plugin list | tee /tmp/sentrux-plugins.txt
          grep -Eq '^[[:space:]]+csharp v' /tmp/sentrux-plugins.txt || {
            echo "::error::C# grammar plugin was not loadable after grammar installation."
            cat /tmp/sentrux-plugins.txt
            exit 1
          }

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release -p sentrux --features vendored-openssl
